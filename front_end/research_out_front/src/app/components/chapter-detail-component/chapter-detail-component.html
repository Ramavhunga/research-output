<div class="pc-container">
  <div class="pc-content">

    <div class="page-header">
      <h5>Chapter Details</h5>
    </div>

    <div class="card">
      <div class="card-body">

        <form>

          <!-- BOOK DETAILS -->
          <h6>Chapter Details</h6>

          <div class="row g-3">

            <div class="col-md-4">
              <label>DHET No</label>
              <input class="form-control" value="B0001" readonly>
            </div>

            <div class="col-md-4">
              <label>Year</label>
              <input type="number" class="form-control" value="2025">
            </div>

            <div class="col-md-4">
              <label>Title</label>
              <input class="form-control" value="AI in Modern Systems">
            </div>

            <div class="col-md-4">
              <label>Publisher</label>
              <input class="form-control" value="Springer">
            </div>

            <div class="col-md-4">
              <label>ISBN</label>
              <input class="form-control" value="978-3-16-148410-0">
            </div>

            <div class="col-md-4">
              <label>Field of Research</label>
              <input class="form-control" value="Computer Science">
            </div>

            <div class="col-md-3">
              <label>Total Pages</label>
              <input type="number" class="form-control" value="300">
            </div>

            <div class="col-md-3">
              <label>Start Page</label>
              <input type="number" class="form-control" value="1">
            </div>

            <div class="col-md-3">
              <label>End Page</label>
              <input type="number" class="form-control" value="300">
            </div>

            <div class="col-md-3">
              <label>Pages Claimed</label>
              <input type="number" class="form-control" value="300">
            </div>

          </div>

          <!-- AUTHORS -->
          <div class="mt-4">
            <h6>Authors</h6>

            <div class="border p-3 mb-2">
              <div class="row g-2">
                <div class="col-md-3">
                  <input class="form-control" value="EMP001">
                </div>
                <div class="col-md-3">
                  <input class="form-control" value="John">
                </div>
                <div class="col-md-3">
                  <input class="form-control" value="Doe">
                </div>
                <div class="col-md-3">
                  <input class="form-control" value="0000-0000-0000-0000">
                </div>
              </div>
            </div>

            <div class="border p-3 mb-2">
              <div class="row g-2">
                <div class="col-md-3">
                  <input class="form-control" value="EMP002">
                </div>
                <div class="col-md-3">
                  <input class="form-control" value="Jane">
                </div>
                <div class="col-md-3">
                  <input class="form-control" value="Smith">
                </div>
                <div class="col-md-3">
                  <input class="form-control" value="0000-0000-0000-0001">
                </div>
              </div>
            </div>

            <button type="button" class="btn btn-outline-primary">
              + Add Author
            </button>
          </div>

          <!-- UNITS -->
          <div class="mt-4">
            <h6>Units</h6>

            <div class="row g-3">

              <div class="col-md-3">
                <label>Max Units</label>
                <input type="number" class="form-control" value="10">
              </div>

              <div class="col-md-3">
                <label>Authors Count</label>
                <input type="number" class="form-control" value="2" readonly>
              </div>

              <div class="col-md-3">
                <label>Proportion</label>
                <input type="number" class="form-control" value="0.5" readonly>
              </div>

              <div class="col-md-3">
                <label>Total Units</label>
                <input type="number" class="form-control" value="5" readonly>
              </div>

            </div>
          </div>

          <!-- ACTION -->
          <div class="mt-4 text-center">
            <button class="btn btn-primary">Save Chapter</button>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>
