<!-- ================= BOOKS LIST ================= -->
&lt;!&ndash; [ Main Content ] start &ndash;&gt;
<div class="pc-container">
  <div class="pc-content">

    <div class="page-header">
      <h5>Books</h5>
    </div>

    <div class="card">
      <div class="card-header d-flex justify-content-between">
        <h5>Books List</h5>


        <button class="btn btn-primary" routerLink="/book/details">Add Book</button>
      </div>

      <div class="card-body">
        <table class="table table-hover">
          <thead>
          <tr>
            <th>Title</th>
            <th>Publisher</th>
            <th>ISBN</th>
            <th>Year</th>
            <th>Status</th>
            <th></th>
          </tr>
          </thead>

          <tbody>

          <tr>
            <td>AI in Modern Systems</td>
            <td>Springer</td>
            <td>978-3-16-148410-0</td>
            <td>2025</td>
            <td><span class="badge bg-success">Approved</span></td>
            <td><button class="btn btn-sm btn-outline-primary">View</button></td>
          </tr>

          <tr>
            <td>Cloud Computing Handbook</td>
            <td>Elsevier</td>
            <td>978-1-23-456789-0</td>
            <td>2024</td>
            <td><span class="badge bg-warning">Pending</span></td>
            <td><button class="btn btn-sm btn-outline-primary">View</button></td>
          </tr>

          <tr>
            <td>Data Science Basics</td>
            <td>IEEE</td>
            <td>978-9-87-654321-0</td>
            <td>2023</td>
            <td><span class="badge bg-danger">Rejected</span></td>
            <td><button class="btn btn-sm btn-outline-primary">View</button></td>
          </tr>

          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
