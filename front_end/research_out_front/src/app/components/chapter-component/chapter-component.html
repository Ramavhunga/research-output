<!-- ================= CHAPTERS LIST ================= -->
<!-- [ Main Content ] start -->
<div class="pc-container">
  <div class="pc-content">

    <div class="page-header">
      <h5>Chapters</h5>
    </div>

    <div class="card table-card">
      <div class="card-header d-flex justify-content-between">
        <h5>Chapters List</h5>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary" (click)="loadChapters()" [disabled]="loading">
            {{ loading ? 'Refreshing...' : 'Refresh' }}
          </button>
          <button class="btn btn-primary" (click)="goToChapterDetails()">Add Chapter</button>
        </div>
      </div>

      <div class="card-body">
        <div *ngIf="loading" class="text-muted mb-2">Loading chapters...</div>
        <table class="table table-hover">
          <thead>
          <tr>
            <th>Title</th>
            <th>Publisher</th>
            <th>ISBN</th>
            <th>Year</th>
            <th>Status</th>
            <th></th>
          </tr>
          </thead>

          <tbody>

          <tr *ngFor="let chapter of chapters">
            <td class="col-4 text-wrap" style="white-space: normal;">
              <h6 class="mb-0">{{ chapter.titleOfContribution || chapter.titleOfBook }}</h6>
            </td>
            <td class="col-3 text-wrap" style="white-space: normal;">{{ chapter.publisher }}</td>
            <td class="col-2">{{ chapter.isbn }}</td>
            <td class="col-1">{{ chapter.yearOfPublication }}</td>
            <td class="col-1">{{ chapterStatus(chapter) }}</td>
            <td class="col-1">
              <button type="button" class="btn btn-sm btn-outline-primary" (click)="viewChapter(chapter)">View</button>
            </td>
          </tr>

          <tr *ngIf="!chapters || chapters.length === 0">
            <td colspan="6" class="text-center text-muted">
              No chapters added yet
            </td>
          </tr>

          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
