<div class="pc-container">
  <div class="pc-content">
    <!-- [ breadcrumb ] start -->
    <div class="page-header">
      <div class="page-block">
        <div class="row align-items-center g-0">
          <div class="col-sm-auto">
            <div class="page-header-title">
              <h5 class="mb-0">Journals Details</h5>
            </div>
          </div>
          <div class="col-sm-auto">
            <ul class="breadcrumb">
              <li class="breadcrumb-item"><a routerLink="/dashboard">Dashboard</a></li>
              <li class="breadcrumb-item"><a routerLink="/journal">Journals</a></li>
              <li class="breadcrumb-item" aria-current="page">Journal Details</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    <!-- [ breadcrumb ] end -->
`
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Researcher’s Journal Interface</h5>
            <button class="btn btn-outline-secondary btn-sm" type="button" (click)="preview()">
              Preview JSON
            </button>

            <button class="btn btn-outline-secondary btn-sm" type="button" (click)="autoPopulateForm()">
              Auto Populate JSON
            </button>
          </div>

          <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">

              <!-- Journal Details -->
              <div class="mb-4">
                <h6 class="mb-3">Journal Details</h6>
                <div class="row g-3">
                  <div class="col-md-4">
                    <label class="form-label">DHET No.</label>
                    <input class="form-control" formControlName="dhetNo" readonly />
                  </div>

                  <div class="col-md-4">
                    <label class="form-label required">Year of Publication</label>
                    <input type="number" class="form-control" formControlName="year"   [ngClass]="{
          'is-invalid': form.get('year')?.invalid && (form.get('year')?.touched || form.get('year')?.dirty)
        }" />
                  </div>

                  <div class="col-md-4">
                    <label class="form-label required">Journal Title</label>
                    <input class="form-control" formControlName="journalTitle"
                           [ngClass]="{'is-invalid': form.get('journalTitle')?.invalid && form.get('journalTitle')?.touched}" />
                  </div>

                  <div class="col-md-4">
                    <label class="form-label required">Article Title</label>

                    <input class="form-control" formControlName="title"
                           [ngClass]="{
    'is-invalid':
      (form.get('title')?.invalid && form.get('title')?.touched) ||
      form.errors?.duplicateJournal
  }"
                    />

                  </div>


                  <div class="col-md-4">
                    <label class="form-label required">Publisher</label>

                    <select class="form-select"
                            formControlName="publisher"
                            [ngClass]="{
          'is-invalid': form.get('publisher')?.invalid &&
                        (form.get('publisher')?.touched || form.get('publisher')?.dirty)
        }">

                      <option [ngValue]="null" disabled>Choose...</option>

                      <option *ngFor="let pub of publishers" [ngValue]="pub.id">
                        {{ pub.name }}
                      </option>

                    </select>

                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Index</label>
                    <input class="form-control" formControlName="index"   [ngClass]="{
          'is-invalid': form.get('index')?.invalid && (form.get('index')?.touched || form.get('index')?.dirty)
        }"/>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Comply with 75% rule</label>
                    <select class="form-select" formControlName="comply"   [ngClass]="{
          'is-invalid': form.get('comply')?.invalid && (form.get('comply')?.touched || form.get('comply')?.dirty)
        }">
                      <option [ngValue]="null" disabled>Choose...</option>
                      <option [ngValue]="true">Yes</option>
                      <option [ngValue]="false">No</option>
                    </select>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Volume</label>
                    <input type="number" class="form-control" formControlName="volume"
                           [ngClass]="{'is-invalid': form.get('volume')?.invalid && form.get('volume')?.touched}" />
                  </div>


                  <div class="col-md-4">
                    <label class="form-label">Issue</label>
                    <input type="number" class="form-control" formControlName="issue"   [ngClass]="{
          'is-invalid': form.get('issue')?.invalid && (form.get('issue')?.touched || form.get('issue')?.dirty)
        }"/>
                  </div>

                <div class="col-md-4">
                  <label class="form-label">ISSN</label>
                  <input class="form-control" formControlName="issn"
                         placeholder="1234-567X"
                         [ngClass]="{'is-invalid': form.get('issn')?.invalid && form.get('issn')?.touched}" />
                </div>

                  <div class="col-md-4">
                    <label class="form-label">e-ISSN</label>
                    <input class="form-control" formControlName="eissn" />
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">DOI</label>
                    <input class="form-control" formControlName="doi" placeholder="10.1234/xyzv    [;m  abc.123"   [ngClass]="{
          'is-invalid': form.get('doi')?.invalid && (form.get('doi')?.touched || form.get('doi')?.dirty)
        }"/>
                  </div>
                  <div class="mb-4">

                    <div class="row g-3">

                      <div class="col-md-4">
                        <label class="form-label">Handle / URL</label>
                        <input
                          type="url"
                          class="form-control"
                          formControlName="urls"
                          placeholder="https://repository.university.ac.za/handle/..."
                        />
                      </div>

                      <div class="col-md-4">
                        <label class="form-label">Open Access Journal?</label>
                        <select class="form-select" formControlName="openaccess">
                          <option value="">Choose...</option>
                          <option value="true">Yes</option>
                          <option value="false">No</option>
                        </select>
                      </div>

                      <div class="col-md-4">
                        <label class="form-label required">Field of Research</label>
                        <input
                          type="text"
                          class="form-control"
                          formControlName="fieldofsearch"
                          placeholder="Search research field..."
                          autocomplete="off"
                          [ngClass]="{
              'is-invalid':
                form.get('fieldofsearch')?.invalid &&
                (form.get('fieldofsearch')?.touched || form.get('fieldofsearch')?.dirty)
            }"
                        />
                        <!-- Dropdown results -->
                        <div class="list-group position-absolute w-100 z-3"
                             *ngIf="filteredResearchFields.length">
                          <button
                            type="button"
                            class="list-group-item list-group-item-action"
                            *ngFor="let rf of filteredResearchFields"
                            (click)="selectResearchField(rf)">
                            {{ rf.code }} - {{ rf.name }}
                          </button>
                        </div>

                      </div>

                    </div>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Funders</label>
                    <input class="form-control" formControlName="funders"
                           placeholder="NRF; NWO; NSERC; NIH;"
                           [ngClass]="{'is-invalid': form.get('funders')?.invalid && form.get('funders')?.touched}" />
                  </div>

                    <div class="col-md-4">
                      <label class="form-label">Publication Fee Description</label>
                      <input class="form-control" formControlName="publicationfeedescription"
                             placeholder="e.g., Open Access Fee"
                             [ngClass]="{'is-invalid': form.get('publicationfeedescription')?.invalid && form.get('publicationfeedescription')?.touched}" />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label">Publisher Currency</label>
                      <input class="form-control" formControlName="publishercurrency"
                             placeholder="USD, EUR, ZAR"
                             [ngClass]="{'is-invalid': form.get('publishercurrency')?.invalid && form.get('publishercurrency')?.touched}" />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label">Total Publication Fee (Publisher Currency)</label>
                      <input type="number" class="form-control" formControlName="totalPublicationFeePublisherCurrency"
                             placeholder="e.g., 1500"
                             [ngClass]="{'is-invalid': form.get('totalPublicationFeePublisherCurrency')?.invalid && form.get('totalPublicationFeePublisherCurrency')?.touched}" />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label">Publication Fee for the Article</label>
                      <input type="number" class="form-control" formControlName="publicationfeearticle"
                             placeholder="e.g., 500"
                             [ngClass]="{'is-invalid': form.get('publicationfeearticle')?.invalid && form.get('publicationfeearticle')?.touched}" />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label">Authors Contribution Fee</label>
                      <input type="number" class="form-control" formControlName="authorsContributionFee"
                             placeholder="e.g., 250"
                             [ngClass]="{'is-invalid': form.get('authorsContributionFee')?.invalid && form.get('authorsContributionFee')?.touched}" />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label">Authors Contribution Fee in ZAR</label>
                      <input type="number" class="form-control" formControlName="authorsContributionFeeZar"
                             placeholder="e.g., 5000"
                             [ngClass]="{'is-invalid': form.get('authorsContributionFeeZar')?.invalid && form.get('authorsContributionFeeZar')?.touched}" />
                    </div>

<!--                        </small>-->
<!--                      </div>-->
<!--                    </div>-->
<!--                  </div>-->
                </div>
                </div>


              <!-- Authors -->
              <div class="mb-4">
                <h6 class="mb-3">Claiming Authors (Journal Article)</h6>

                <div formArrayName="authors" class="vstack gap-3">

                          <option [ngValue]="true">Affiliated</option>

                        </select>

                      </div>

                    </div>

                            <option value="">Day</option>
                            <option *ngFor="let day of getDaysArray()" [value]="day">{{ day }}</option>
                          </select>

                      </div>

                      <div class="col-md-3">

                        <input

                          type="button"
                          class="btn btn-outline-danger btn-sm"
                          (click)="removeAuthor(i)"
                          *ngIf="authorsFA.length > 1"
                        >
                          Remove Author
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                <button type="button" class="btn btn-outline-primary mt-2" (click)="addAuthor()">
                  + Add Author
                </button>
              </div>
              <!-- Units (single block, not list) -->
              <div class="mb-4" [formGroup]="unitsFG">
                <h6 class="mb-3">Units</h6>
                <div class="row g-3">
                  <div class="col-md-3">
                    <label class="form-label">Max units for publication</label>
                    <input type="number" class="form-control" formControlName="maxUnitsForPublication" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Total Proportion of Authors</label>
                    <input type="number" step="0.01" class="form-control" formControlName="totalProportionOfAuthors" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Authors Count</label>
                    <input type="number" class="form-control" formControlName="authorCount" readonly />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Total Units Claimed</label>
                    <input type="number" class="form-control" formControlName="totalUnitsClaimed" readonly />
                  </div>

<!--                  <div class="col-12">-->
<!--                    <label class="form-label">Other Authors (Non-affiliates)</label>-->
<!--                    <textarea class="form-control" rows="2" formControlName="otherAuthorsNonAffiliates"></textarea>-->
<!--                  </div>-->

                  <div class="col-12">
                    <label class="form-label">Additional Comments</label>
                    <textarea class="form-control" rows="2" formControlName="additionalComments"></textarea>
                  </div>
                </div>
              </div>
              <!-- Claiming Authors Contribution -->
              <div class="mb-4" [formGroup]="claimingAuthorsContributionFG">
                <h6 class="mb-3">Claiming Authors Contribution</h6>
                <div class="row g-3">
                  <div class="col-md-4">
                    <label class="form-label">Proportion of Authors</label>
                    <input
                      type="number"
                      step="0.01"
                      class="form-control"
                      formControlName="proportionOfAuthors"
                      readonly
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Author Units Claimed</label>
                    <input
                      type="number"
                      step="0.01"
                      class="form-control"
                      formControlName="authorUnitsClaimed"
                      readonly
                    />
                  </div>
                  <div class="col-md-12">
                    <label class="form-label">Additional Comments</label>
                    <textarea class="form-control" rows="2" formControlName="additionalComments"></textarea>
                  </div>
                </div>
              </div>






              <!-- Actions -->
              <div class="sticky-actions d-flex gap-2 justify-content-center flex-wrap p-3 border-top bg-white">
                <button type="button" class="btn btn-outline-secondary" (click)="reset()">Reset</button>
                <button type="submit" class="btn btn-primary">Submit</button>
              </div>

            </form>

            <!-- Preview JSON -->
            <div class="mt-4" *ngIf="showPreview">
              <h6>Preview JSON</h6>
              <pre class="bg-light p-3 border rounded small" style="max-height: 400px; overflow:auto;">
{{ previewJson }}
              </pre>
              <button class="btn btn-sm btn-outline-secondary" type="button" (click)="closePreview()">
                Close Preview
              </button>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>
</div>
