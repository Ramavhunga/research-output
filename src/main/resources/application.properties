spring.datasource.url=jdbc:sqlserver://10.21.0.20;database=research_output;user=pms;password=Univen@?18844;encrypt=true;trustServerCertificate=true;
spring.datasource.username=pms
spring.datasource.password=Univen@?18844
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.docker.compose.enabled=false
# IMPORTANT: Disable automatic schema initialization to prevent conflicts with existing database
# If you need to run schema.sql manually, execute it on your database directly
spring.sql.init.mode=never

# PERFORMANCE OPTIMIZATIONS FOR DASHBOARD
# Batch processing for better performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Connection pooling - tune for concurrent users
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Query performance tuning
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

