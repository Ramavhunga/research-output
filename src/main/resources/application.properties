spring.datasource.username=pms
spring.datasource.password=Univen@?18844
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.docker.compose.enabled=false
# Disabled schema init to avoid parser issues with legacy SQL
spring.sql.init.mode=never

# ============================================================================
# DIAGNOSTICS (enable to troubleshoot SQL mapping issues)
# ============================================================================
# Uncomment during debugging to see actual SQL and parameter bindings
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
# logging.level.com.microsoft.sqlserver.jdbc=DEBUG

# ============================================================================
# PERFORMANCE OPTIMIZATIONS FOR DASHBOARD
# ============================================================================
# Batch processing for better performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Connection pooling - tune for concurrent users
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Query performance tuning
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

