spring.application.name=research_output
spring.profiles.active=dev

# ============================================================================
# DEVELOPMENT PROFILE - Auto-initialize schema from schema.sql
# ============================================================================
# This profile ONLY applies during local development
# Production uses application.properties (spring.sql.init.mode=never)

# Enable automatic schema initialization from schema.sql
spring.sql.init.mode=always

# ============================================================================
# DATABASE (same as production config)
# ============================================================================
spring.datasource.url=jdbc:sqlserver://10.21.0.20;database=research_output;user=pms;password=Univen@?18844;encrypt=true;trustServerCertificate=true;
spring.datasource.username=pms
spring.datasource.password=Univen@?18844
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# DIAGNOSTICS - Enable SQL logging in dev
# ============================================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.microsoft.sqlserver.jdbc=DEBUG

# ============================================================================
# CONNECTION POOLING - Same as production
# ============================================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# PERFORMANCE OPTIMIZATIONS
# ============================================================================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# ============================================================================
# CORS (from main config)
# ============================================================================
app.cors.allowed-origin-patterns=http://localhost:4200,http://localhost:4201,http://localhost:3000,http://127.0.0.1:4200,http://127.0.0.1:3000,https://*.azurestaticapps.net,https://*.azurewebsites.net

